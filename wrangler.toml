name = "tally"
main = "src/worker/index.ts"
compatibility_date = "2026-07-19"

assets = { directory = "out", binding = "ASSETS", run_worker_first = ["/api/*"] }

[[d1_databases]]
binding = "DB"
database_name = "tally"
database_id = "replace-with-d1-database-id"

[vars]
# Set these for production in Cloudflare, not in frontend code.
CF_ACCESS_TEAM_DOMAIN = "replace-with-team.cloudflareaccess.com"
CF_ACCESS_AUD = "replace-with-access-aud"
