name = "tally"
main = "src/worker/index.ts"
compatibility_date = "2026-07-19"

assets = { directory = "out", binding = "ASSETS", run_worker_first = ["/api/*"] }

[[d1_databases]]
binding = "DB"
database_name = "tally"
database_id = "replace-with-d1-database-id"

[secrets]
required = ["CF_ACCESS_TEAM_DOMAIN", "CF_ACCESS_AUD"]
