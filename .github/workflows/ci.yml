name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install JavaScript dependencies
        run: corepack enable && yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Run tests
        run: yarn test

      - name: Build static site
        run: yarn build
