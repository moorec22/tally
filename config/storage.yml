test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Use bin/rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
# amazon:
#   service: S3
#   access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
#   secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
#   region: us-east-1
#   bucket: your_own_bucket-<%= Rails.env %>

# Uses Cloud Run's application default credentials by default. Set
# GOOGLE_APPLICATION_CREDENTIALS only when running outside Google Cloud with a
# local service-account key.
google:
  service: GCS
  project: <%= ENV.fetch("GOOGLE_CLOUD_PROJECT", ENV["GOOGLE_PROJECT_ID"]) %>
  bucket: <%= ENV["GOOGLE_CLOUD_STORAGE_BUCKET"] %>
<% unless ENV["GOOGLE_APPLICATION_CREDENTIALS"].to_s.empty? %>
  credentials: <%= ENV["GOOGLE_APPLICATION_CREDENTIALS"] %>
<% end %>

